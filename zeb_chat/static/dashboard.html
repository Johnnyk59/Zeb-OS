<title>Zeb Dashboard</title>
<style>
  :root{
    --bg:#0a0a0b; --g1:#111114; --g2:#17171b; --g3:#202026; --g4:#2a2a32;
    --line:#26262e; --txt:#e6e6ea; --dim:#8a8a96; --dim2:#5a5a66;
    --cyan:#22e0d0; --violet:#a06bff; --magenta:#ff5cc8; --amber:#ffb454;
    --danger:#ff5a6a;
    --ui:"Space Grotesk","Geist",ui-sans-serif,system-ui,sans-serif;
    --mono:"JetBrains Mono","Cascadia Code",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg);color:var(--txt);font-family:var(--ui);
    overflow:hidden;font-size:14px;letter-spacing:.2px;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:var(--ui);cursor:pointer}
  input,textarea{font-family:var(--ui)}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--g4);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}

  .label{font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;font-size:10px;color:var(--dim)}

  /* AUTH GATE */
  #gate{position:fixed;inset:0;background:radial-gradient(1200px 700px at 80% -10%,#141420,#0a0a0b 60%);
    display:flex;align-items:center;justify-content:center;z-index:100}
  .gate-card{width:380px;max-width:90vw;background:var(--g1);border:1px solid var(--line);
    border-radius:16px;padding:32px;box-shadow:0 30px 80px rgba(0,0,0,.6);
    animation:pop .4s cubic-bezier(.2,.8,.2,1)}
  .gate-card h1{font-size:20px;margin:0 0 4px;letter-spacing:-.5px}
  .gate-card p{color:var(--dim);margin:0 0 20px;font-size:13px}
  .gate-card .brandmark{width:38px;height:38px;border-radius:10px;margin-bottom:16px;
    background:linear-gradient(135deg,var(--cyan),var(--violet));
    box-shadow:0 0 24px rgba(34,224,208,.4)}
  .field{width:100%;background:var(--g2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:12px 14px;font-size:14px;outline:none;transition:border .15s,box-shadow .15s}
  .field:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,224,208,.15)}
  .btn{background:var(--g3);border:1px solid var(--line);color:var(--txt);border-radius:10px;
    padding:11px 16px;font-size:13px;transition:all .15s;letter-spacing:.3px}
  .btn:hover{background:var(--g4);border-color:var(--g4)}
  .btn-accent{background:linear-gradient(135deg,var(--cyan),var(--violet));border:none;color:#06110f;font-weight:600}
  .btn-accent:hover{filter:brightness(1.1)}
  .btn-danger{color:var(--danger);border-color:#3a2226}
  .btn-danger:hover{background:#2a1418;border-color:var(--danger)}
  .gate-err{color:var(--danger);font-size:12px;margin-top:10px;min-height:16px}

  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ONBOARDING (first-boot identity questions) */
  #onboard{position:fixed;inset:0;background:radial-gradient(1200px 700px at 20% -10%,#141420,#0a0a0b 60%);
    display:flex;align-items:center;justify-content:center;z-index:90}
  .onboard-card{width:460px;max-width:92vw;background:var(--g1);border:1px solid var(--line);border-radius:16px;
    padding:30px;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:pop .4s cubic-bezier(.2,.8,.2,1)}
  .onboard-card h1{font-size:20px;margin:0 0 4px;letter-spacing:-.5px}
  .onboard-card p{color:var(--dim);margin:0 0 18px;font-size:13px}
  .ob-q{display:block;font-size:13px;color:var(--txt);margin:14px 0 6px}
  .ob-q span{color:var(--dim2);font-size:11px;font-family:var(--mono)}
  .onboard-card textarea.field{min-height:64px;resize:vertical}

  /* APP LAYOUT */
  #app{display:none;height:100%}
  #app.on{display:flex}
  .sidebar{width:20%;min-width:210px;max-width:320px;background:var(--g1);border-right:1px solid var(--line);
    display:flex;flex-direction:column;height:100%;transition:width .2s ease,min-width .2s ease}
  .sidebar.collapsed{width:0;min-width:0;max-width:0;border-right:none;overflow:hidden}
  .brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px}
  .brand-name{flex:1;min-width:0}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--violet));
    box-shadow:0 0 16px rgba(34,224,208,.35);flex:none}
  .brand b{font-size:15px;letter-spacing:-.3px}
  .brand span{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:2px;display:block}
  .collapse-btn{background:transparent;border:none;color:var(--dim);font-size:14px;padding:4px 6px;border-radius:6px;transition:all .14s;flex:none}
  .collapse-btn:hover{color:var(--txt);background:var(--g2)}
  .sidebar-open{position:fixed;top:14px;left:12px;z-index:60;display:none;background:var(--g2);border:1px solid var(--line);
    color:var(--txt);font-size:15px;width:34px;height:34px;border-radius:9px;align-items:center;justify-content:center}
  .sidebar-open.show{display:flex}
  .sidebar-open:hover{background:var(--g3)}
  .tabs{flex:1;overflow-y:auto;padding:8px 10px}
  .tab{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;
    border:1px solid transparent;color:var(--dim);padding:10px 12px;border-radius:9px;margin:2px 0;
    font-size:13px;transition:all .14s;letter-spacing:.2px}
  .tab:hover{color:var(--txt);background:var(--g2)}
  .tab.active{color:var(--txt);background:var(--g2);border-color:var(--line)}
  .tab.active .ic{color:var(--cyan);filter:drop-shadow(0 0 6px rgba(34,224,208,.6))}
  .tab .ic{width:16px;text-align:center;color:var(--dim2);font-size:13px}
  .sidebar-foot{padding:12px;border-top:1px solid var(--line)}
  .keyline{display:flex;align-items:center;justify-content:space-between;padding:0 4px 10px;font-size:11px;color:var(--dim2)}
  .keyline a{color:var(--cyan);cursor:pointer;text-decoration:none}

  /* MAIN */
  .main{flex:1;position:relative;height:100%;overflow:hidden;background:radial-gradient(900px 500px at 90% -5%,#101018,#0a0a0b 55%)}
  #brainWrap{position:fixed;top:52px;right:16px;width:180px;height:180px;z-index:40;pointer-events:none}
  #brainCanvas{width:100%;height:100%;display:block}
  .brain-fallback{position:absolute;inset:0;width:100%;height:100%}
  .brain-fallback .fedge{stroke:rgba(160,107,255,.3);stroke-width:.6;fill:none}
  .brain-fallback .fedge.pulse{stroke:rgba(34,224,208,.85);stroke-width:.8;
    stroke-dasharray:5 11;animation:fdash 2.4s linear infinite}
  .brain-fallback .fnode{fill:#22e0d0;filter:drop-shadow(0 0 3px rgba(34,224,208,.85));
    animation:fnode 2.6s ease-in-out infinite}
  @keyframes fdash{to{stroke-dashoffset:-32}}
  @keyframes fnode{0%,100%{opacity:.4;r:2}50%{opacity:1;r:3.1}}
  .brain-status{position:absolute;bottom:2px;width:100%;text-align:center;font-family:var(--mono);
    font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}

  /* PANELS */
  .pane{position:absolute;inset:0;display:none;flex-direction:column;animation:fadein .22s ease}
  .pane.show{display:flex}
  .pane-head{display:flex;align-items:center;gap:12px;padding:20px 26px 14px;border-bottom:1px solid var(--line)}
  .pane-head h2{margin:0;font-size:17px;letter-spacing:-.3px}
  .pane-head .back{margin-left:auto}
  .pane-body{flex:1;overflow-y:auto;padding:20px 26px}
  .empty{color:var(--dim);text-align:center;padding:60px 20px;font-size:13px}
  .empty .big{font-size:30px;margin-bottom:10px;opacity:.5}
  .err-inline{background:#2a1418;border:1px solid #3a2226;color:var(--danger);
    padding:10px 14px;border-radius:9px;font-size:12px;margin:8px 0;font-family:var(--mono)}

  .row{display:flex;align-items:center;gap:12px;background:var(--g1);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;margin-bottom:8px;transition:all .14s}
  .row:hover{border-color:var(--g4);background:var(--g2)}
  .row .title{font-size:13px;color:var(--txt)}
  .row .meta{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:3px}
  .row .grow{flex:1;min-width:0;cursor:pointer}
  .badge{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;
    padding:3px 7px;border-radius:5px;border:1px solid var(--line);color:var(--dim)}
  .badge.on{color:var(--cyan);border-color:rgba(34,224,208,.3);background:rgba(34,224,208,.08)}
  .badge.off{color:var(--amber);border-color:rgba(255,180,84,.3);background:rgba(255,180,84,.08)}
  .badge.v{color:var(--violet);border-color:rgba(160,107,255,.3);background:rgba(160,107,255,.08)}
  .iconbtn{background:transparent;border:none;color:var(--dim2);font-size:16px;padding:4px 8px;border-radius:6px;transition:all .14s}
  .iconbtn:hover{color:var(--danger);background:#2a1418}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}

  /* SKILL STACKS */
  .stack{margin-bottom:10px}
  .stack-head{display:flex;align-items:center;gap:10px;background:var(--g2);border:1px solid var(--line);
    border-radius:10px;padding:11px 14px;cursor:pointer;transition:all .14s}
  .stack-head:hover{border-color:var(--g4)}
  .stack-head .caret{color:var(--cyan);font-size:11px;transition:transform .18s;display:inline-block}
  .stack.collapsed .caret{transform:rotate(-90deg)}
  .stack-head .sname{flex:1;font-size:13px;letter-spacing:.2px}
  .stack-body{margin:8px 0 0 6px;padding-left:12px;border-left:1px solid var(--line)}
  .stack.collapsed .stack-body{display:none}

  /* DIAGNOSE + LOCAL MODEL STATUS */
  .diag-note{font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--g1);border:1px solid var(--line);
    border-radius:9px;padding:10px 13px;margin-bottom:14px;line-height:1.5}
  .diag-note b{color:var(--cyan)}
  .diag-banner{display:flex;align-items:center;gap:10px;padding:12px 15px;border-radius:10px;margin-bottom:14px;
    font-size:13px;border:1px solid var(--line)}
  .diag-banner .dbdot{width:9px;height:9px;border-radius:50%;flex:none;background:currentColor;
    box-shadow:0 0 10px currentColor}
  .diag-banner.ok{background:rgba(34,224,208,.08);border-color:rgba(34,224,208,.3);color:var(--cyan)}
  .diag-banner.degraded{background:rgba(255,180,84,.08);border-color:rgba(255,180,84,.3);color:var(--amber)}
  .diag-banner.critical,.diag-banner.unknown{background:#2a1418;border-color:#3a2226;color:var(--danger)}
  .badge.crit{color:var(--danger);border-color:#3a2226;background:#2a1418}
  .badge.rep{color:var(--violet);border-color:rgba(160,107,255,.3);background:rgba(160,107,255,.08)}

  .stat-dot{width:11px;height:11px;border-radius:50%;background:var(--dim2);display:inline-block;flex:none}
  .stat-dot.on{background:var(--cyan);box-shadow:0 0 11px var(--cyan);animation:sdp 1.4s ease-in-out infinite}
  .stat-dot.warn{background:var(--amber);box-shadow:0 0 8px rgba(255,180,84,.7)}
  .stat-dot.off{background:var(--dim2)}
  @keyframes sdp{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.28)}}

  .card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat-card{background:var(--g1);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .stat-card .sc-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim2);margin-bottom:6px}
  .stat-card .sc-val{font-size:18px;color:var(--txt);letter-spacing:-.3px}
  .stat-card .sc-sub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px;word-break:break-all}
  @media (max-width:680px){.card-grid{grid-template-columns:1fr}}

  .meter{margin:12px 0}
  .meter .mlabel{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:5px}
  .meter .mlabel b{color:var(--txt);font-weight:500}
  .meter .mbar{height:8px;background:var(--g2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .meter .mfill{height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,var(--cyan),var(--violet));transition:width .45s ease}
  .meter .mfill.hot{background:linear-gradient(90deg,var(--amber),var(--danger))}

  .logbox{background:#050506;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-family:var(--mono);
    font-size:11px;max-height:240px;overflow:auto;line-height:1.65}
  .logline{display:flex;gap:9px;white-space:nowrap}
  .logline .lt{color:var(--dim2);flex:none}
  .logline .le{color:var(--cyan);flex:none;min-width:118px}
  .logline.warn .le{color:var(--amber)}
  .logline.error .le{color:var(--danger)}
  .logline .ld{color:var(--dim);white-space:normal}
  .sec-label{font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;font-size:10px;color:var(--dim);margin:18px 0 8px}

  /* CHAT */
  .chat-top{display:flex;align-items:center;gap:12px;padding:16px 26px;border-bottom:1px solid var(--line)}
  .chat-top h2{margin:0;font-size:15px;letter-spacing:-.2px}
  .modelsel{margin-left:auto;background:var(--g1);border:1px solid var(--line);color:var(--txt);border-radius:9px;
    padding:7px 10px;font-size:12px;font-family:var(--mono);letter-spacing:.3px;outline:none;max-width:240px;transition:border .15s}
  .modelsel:focus{border-color:var(--cyan)}
  .seg{display:flex;background:var(--g1);border:1px solid var(--line);border-radius:9px;padding:3px;margin-left:12px;margin-right:200px}
  .seg button{background:transparent;border:none;color:var(--dim);padding:6px 13px;border-radius:7px;font-size:12px;
    font-family:var(--mono);letter-spacing:.5px;transition:all .15s}
  .seg button.on{background:var(--g3);color:var(--cyan)}
  .chat-scroll{flex:1;overflow-y:auto;padding:24px 26px;display:flex;flex-direction:column;gap:14px}
  .chat-scroll.centered{max-width:920px;width:100%;margin:0 auto}
  .msg{max-width:66%;animation:fadein .25s ease}
  .msg .who{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim2);margin-bottom:5px}
  .bubble{padding:12px 15px;border-radius:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;font-size:14px}
  .msg.user{align-self:flex-end;text-align:right;margin-right:8%}
  .msg.user .bubble{background:linear-gradient(135deg,rgba(34,224,208,.16),rgba(160,107,255,.14));
    border:1px solid rgba(34,224,208,.22);border-bottom-right-radius:4px;text-align:left}
  .msg.agent{align-self:flex-start}
  .msg.agent .bubble{background:var(--g2);border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg .ts{font-family:var(--mono);font-size:9px;color:var(--dim2);margin-top:4px}
  .typing{display:flex;gap:5px;padding:14px 16px;background:var(--g2);border:1px solid var(--line);
    border-radius:14px;border-bottom-left-radius:4px;width:fit-content}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--cyan);opacity:.5;animation:bob 1s infinite}
  .typing i:nth-child(2){animation-delay:.15s;background:var(--violet)}
  .typing i:nth-child(3){animation-delay:.3s;background:var(--magenta)}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

  .composer{padding:14px 26px 18px;border-top:1px solid var(--line)}
  .composer-inner{max-width:920px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  #chatInput{flex:1;resize:none;background:var(--g1);border:1px solid var(--line);color:var(--txt);
    border-radius:12px;padding:13px 15px;font-size:14px;max-height:160px;min-height:48px;outline:none;
    transition:border .15s,box-shadow .15s;line-height:1.45}
  #chatInput:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,224,208,.13)}
  #sendBtn{height:48px;padding:0 20px;border-radius:12px}
  #sendBtn:disabled{opacity:.4;cursor:not-allowed}
  .iconvoice{height:48px;width:48px;padding:0;border-radius:12px;font-size:18px;display:flex;align-items:center;justify-content:center}
  .iconvoice.listening{border-color:var(--magenta);color:var(--magenta);
    box-shadow:0 0 0 3px rgba(255,92,200,.18);animation:vpulse 1.1s ease-in-out infinite}
  .iconvoice.speaking{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 0 3px rgba(34,224,208,.18)}
  .iconvoice:disabled{opacity:.35;cursor:not-allowed}
  @keyframes vpulse{0%,100%{box-shadow:0 0 0 3px rgba(255,92,200,.14)}50%{box-shadow:0 0 0 6px rgba(255,92,200,.28)}}

  /* TERMINAL MODE */
  #chatPane.term{background:#050506}
  #chatPane.term .chat-scroll{max-width:none;font-family:var(--mono);gap:10px;font-size:13px;background:#050506}
  #chatPane.term .msg{max-width:none;align-self:stretch!important;text-align:left!important;margin-right:0!important}
  #chatPane.term .msg .who{display:none}
  #chatPane.term .bubble{background:transparent!important;border:none!important;border-radius:0!important;padding:2px 0;
    white-space:pre-wrap;font-family:var(--mono);text-align:left!important}
  #chatPane.term .msg.user .bubble::before{content:"> ";color:var(--cyan)}
  #chatPane.term .msg.user .bubble{color:var(--cyan)}
  #chatPane.term .msg.agent .bubble{color:#b9c4bd;border-left:2px solid var(--g4)!important;padding-left:12px!important}
  #chatPane.term .msg .ts{text-align:left}
  #chatPane.term #chatInput{font-family:var(--mono);background:#0a0b0c}

  .kv{display:flex;gap:8px;margin-bottom:8px}
  .kv .field{flex:1}
  .mono-view{background:#050506;border:1px solid var(--line);border-radius:10px;padding:16px;
    font-family:var(--mono);font-size:12px;white-space:pre-wrap;color:#b9c4bd;overflow:auto;line-height:1.5}
  .crumb{font-family:var(--mono);font-size:12px;color:var(--dim);margin-bottom:12px;word-break:break-all}
  .crumb b{color:var(--cyan)}
  .spin{width:18px;height:18px;border:2px solid var(--g4);border-top-color:var(--cyan);border-radius:50%;
    animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .cur-model{color:var(--cyan)}
  @media (max-width:1100px){.seg{margin-right:120px}}
</style>

<!-- AUTH GATE -->
<div id="gate">
  <div class="gate-card">
    <div class="brandmark"></div>
    <h1>Enter your Zeb API key</h1>
    <p>Your key is stored locally in this browser and sent with each request.</p>
    <input id="gateInput" class="field" type="password" placeholder="zeb_..." autocomplete="off" spellcheck="false"/>
    <div class="gate-err" id="gateErr"></div>
    <div style="margin-top:14px;display:flex;justify-content:flex-end">
      <button class="btn btn-accent" id="gateBtn">Unlock &rarr;</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <button class="sidebar-open" id="sidebarOpen" title="Show sidebar">&#9776;</button>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="dot"></div>
      <div class="brand-name"><b>Zeb</b><span>DASHBOARD</span></div>
      <button class="collapse-btn" id="sidebarCollapse" title="Hide sidebar">&#10094;</button>
    </div>
    <nav class="tabs" id="tabs"></nav>
    <div class="sidebar-foot">
      <div class="keyline"><span class="label">Session</span><a id="changeKey">change key</a></div>
      <button class="btn btn-danger" id="restartBtn" style="width:100%">&#9211; Restart Gateway</button>
    </div>
  </aside>

  <main class="main">
    <div id="brainWrap">
      <canvas id="brainCanvas"></canvas>
      <div class="brain-status" id="brainStatus">idle</div>
    </div>

    <!-- CHAT PANE -->
    <section class="pane show" id="chatPane">
      <div class="chat-top">
        <h2 id="chatTitle">New Chat</h2>
        <select class="modelsel" id="modelSel" title="Model for this chat — Local is the default"></select>
        <div class="seg">
          <button id="modeSimple" class="on">Chat</button>
          <button id="modeTerm">Terminal</button>
        </div>
      </div>
      <div class="chat-scroll centered" id="chatScroll"></div>
      <div class="composer">
        <div class="composer-inner">
          <textarea id="chatInput" placeholder="Message Zeb…  (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
          <button class="btn iconvoice" id="voiceBtn" title="Voice chat">&#127908;</button>
          <button class="btn btn-accent" id="sendBtn">Send</button>
        </div>
      </div>
    </section>

    <!-- GENERIC DATA PANE -->
    <section class="pane" id="dataPane">
      <div class="pane-head">
        <h2 id="dataTitle">Panel</h2>

</div>

<script>
/* ============ CORE / AUTH / FETCH ============ */
const LS_KEY='zeb_dash_key', LS_MODE='zeb_dash_mode', LS_CHAT='zeb_dash_chat', LS_MODEL='zeb_dash_model';
let KEY=localStorage.getItem(LS_KEY)||'';
const $=s=>document.querySelector(s);
const el=(t,c,txt)=>{const e=document.createElement(t);if(c)e.className=c;if(txt!=null)e.textContent=txt;return e;};
function esc(s){return String(s==null?'':s);}

const gate=$('#gate'), app=$('#app');
function showGate(){gate.style.display='flex';app.classList.remove('on');$('#gateInput').value='';setTimeout(()=>$('#gateInput').focus(),50);}
function enterApp(){gate.style.display='none';app.classList.add('on');boot();}

async function validateKey(v){
  try{
    const res=await fetch('/api/status',{headers:{'Authorization':'Bearer '+v}});
    return res.ok;
  }catch(e){return false;}
}

$('#gateBtn').onclick=submitKey;
$('#gateInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitKey();});
async function submitKey(){
  const v=$('#gateInput').value.trim();
  if(!v){$('#gateErr').textContent='Please enter a key.';return;}
  $('#gateErr').textContent='Checking...';
  const good=await validateKey(v);
  if(!good){$('#gateErr').textContent='Invalid API key.';return;}
  KEY=v;localStorage.setItem(LS_KEY,v);$('#gateErr').textContent='';enterApp();
}
$('#changeKey').onclick=()=>{localStorage.removeItem(LS_KEY);KEY='';showGate();};

async function api(path,opts){
  opts=opts||{};
  const headers=Object.assign({'Authorization':'Bearer '+KEY},opts.headers||{});
  if(opts.body&&!headers['Content-Type'])headers['Content-Type']='application/json';
  let res;
  try{res=await fetch(path,{method:opts.method||'GET',headers,body:opts.body});}
  catch(e){throw new Error('Network error: '+e.message);}
  if(res.status===401){localStorage.removeItem(LS_KEY);KEY='';showGate();throw new Error('Unauthorized');}
  if(!res.ok){let t='';try{t=(await res.json()).detail||'';}catch(_){}throw new Error('HTTP '+res.status+(t?': '+t:''));}
  const ct=res.headers.get('content-type')||'';
  return ct.includes('application/json')?res.json():res.text();
}

/* ============ TABS ============ */
const TABS=[
  {id:'sessions',label:'Chat Sessions',ic:'&#9670;'},
  {id:'files',label:'Files',ic:'&#9636;'},
  {id:'models',label:'Models',ic:'&#9673;'},
  {id:'localmodel',label:'Local Model Status',ic:'&#9889;'},
  {id:'cron',label:'Cron Jobs',ic:'&#9201;'},
  {id:'skills',label:'Skills',ic:'&#10022;'},
  {id:'plugins',label:'Plugins',ic:'&#9638;'},
  {id:'channels',label:'Channels',ic:'&#9758;'},
  {id:'repos',label:'GitHub Repos',ic:'&#8862;'},
  {id:'diagnose',label:'Zeb Diagnose',ic:'&#10010;'},
  {id:'keys',label:'API Keys',ic:'&#9919;'},
];
const tabsEl=$('#tabs');
let activeTab='sessions';
TABS.forEach(t=>{
  const b=el('button','tab');b.dataset.id=t.id;
  b.innerHTML='<span class="ic">'+t.ic+'</span><span>'+t.label+'</span>';
  b.onclick=()=>openTab(t.id);
  tabsEl.appendChild(b);
});
function setActive(id){document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.id===id));}

// Live panels (Local Model Status) refresh on a timer; keep a single handle
// so switching tabs / returning to chat always tears the poll down.
let panelTimer=null;
function stopPanelTimer(){if(panelTimer){clearInterval(panelTimer);panelTimer=null;}}

function showChat(){
  stopPanelTimer();
  $('#chatPane').classList.add('show');$('#dataPane').classList.remove('show');
}
function showData(title){
  $('#dataTitle').textContent=title;
  $('#dataPane').classList.add('show');$('#chatPane').classList.remove('show');
}
$('#backBtn').onclick=()=>{setActive('sessions');showChat();};

function openTab(id){
  stopPanelTimer();
  activeTab=id;setActive(id);
  if(id==='sessions'){renderSessions();showData('Chat Sessions');}
  else if(id==='files')renderFiles('');
  else if(id==='models')renderSimple('Models',loadModels);
  else if(id==='localmodel')renderLocalModel();
  else if(id==='cron')renderSimple('Cron Jobs',loadCron);
  else if(id==='skills')renderSimple('Skills',loadSkills);
  else if(id==='plugins')renderSimple('Plugins',loadPlugins);
  else if(id==='channels')renderChannels();
  else if(id==='repos')renderRepos();
  else if(id==='diagnose')renderDiagnose();
  else if(id==='keys')renderKeys();
}

function bodyLoading(){const b=$('#dataBody');b.innerHTML='';b.appendChild(el('div','empty')).innerHTML='<span class="spin"></span>';}
function inlineErr(msg){const d=el('div','err-inline',msg);return d;}
function emptyState(icon,msg){const d=el('div','empty');d.innerHTML='<div class="big">'+icon+'</div>'+esc(msg);return d;}

/* ============ SESSIONS ============ */
async function renderSessions(){
  showData('Chat Sessions');bodyLoading();
  const b=$('#dataBody');
  const bar=el('div','toolbar');
  const nw=el('button','btn btn-accent','+ New chat');nw.onclick=newSession;
  const rf=el('button','btn','Refresh');rf.onclick=renderSessions;
  bar.appendChild(nw);bar.appendChild(rf);
  try{
    const data=await api('/api/sessions');
    const list=Array.isArray(data)?data:(data.sessions||[]);
    b.innerHTML='';b.appendChild(bar);
    if(!list.length){b.appendChild(emptyState('&#9670;','No sessions yet. Start a new chat.'));return;}
    list.forEach(s=>{
      const r=el('div','row');
      const g=el('div','grow');
      g.appendChild(el('div','title',s.title||s.name||('Session '+(s.id||''))));
      g.appendChild(el('div','meta',(s.message_count!=null?s.message_count+' msgs · ':'')+ (s.updated||s.updated_at||'')));
      g.onclick=()=>loadSession(s.id,s.title);
      const del=el('button','iconbtn','×');
      del.onclick=async(e)=>{e.stopPropagation();try{await api('/api/sessions/'+s.id,{method:'DELETE'});renderSessions();}catch(err){alert(err.message);}};
      r.appendChild(g);r.appendChild(del);b.appendChild(r);
    });
  }catch(e){b.innerHTML='';b.appendChild(bar);b.appendChild(inlineErr(e.message));}
}
async function newSession(){
  try{const s=await api('/api/sessions',{method:'POST',body:JSON.stringify({title:'New Chat'})});
    history=[];const id=s&&(s.id!=null?s.id:s.session_id);currentSession=id;$('#chatTitle').textContent=(s&&s.title)||'New Chat';
    renderMessages();saveChatState();setActive('sessions');showChat();
  }catch(e){alert(e.message);}
}
async function loadSession(id,title){
  try{
    const s=await api('/api/sessions/'+id);
    const msgs=s.messages||s.history||[];
    history=msgs.map(m=>({role:m.role,content:m.content}));
    currentSession=id;$('#chatTitle').textContent=title||s.title||('Session '+id);
    renderMessages();saveChatState();setActive('sessions');showChat();
  }catch(e){showChat();alert(e.message);}
}

/* ============ SIMPLE LIST TABS ============ */
async function renderSimple(title,loader){
  showData(title);bodyLoading();
  const b=$('#dataBody');
  try{const nodes=await loader();b.innerHTML='';nodes.forEach(n=>b.appendChild(n));}
  catch(e){b.innerHTML='';b.appendChild(inlineErr(e.message));}
}
function toArr(d,keys){if(Array.isArray(d))return d;for(const k of keys)if(d&&Array.isArray(d[k]))return d[k];return [];}

async function loadModels(){
  const d=await api('/api/models');
  const cur=d.current||d.active||d.model||'';
  const list=toArr(d,['available','models','list']);
  const out=[];
  // Zero models until a provider is actually connected.
  if(!list.length){
    out.push(emptyState('&#9673;','No models connected. Add a provider key in the API Keys tab (or Zeb runs its local backbone by default).'));
    return out;
  }
  list.forEach(m=>{const name=typeof m==='string'?m:(m.id||m.name||'');
    const prov=(typeof m==='object'&&m.provider)?m.provider:'';
    const r=el('div','row');const g=el('div','grow');g.appendChild(el('div','title',name));
    if(prov)g.appendChild(el('div','meta',prov));
    r.appendChild(g);if(name===cur)r.appendChild(el('span','badge on','current'));out.push(r);});
  return out;
}
async function loadCron(){
  const list=toArr(await api('/api/cron'),['jobs','cron','crons']);
  if(!list.length)return [emptyState('&#9201;','No cron jobs configured.')];
  return list.map(j=>{const r=el('div','row');const g=el('div','grow');
    g.appendChild(el('div','title',j.name||j.id||'job'));
    g.appendChild(el('div','meta',j.schedule||j.cron||''));
    r.appendChild(g);
    const on=j.enabled!==false;r.appendChild(el('span','badge '+(on?'on':'off'),on?'enabled':'disabled'));return r;});
}
async function loadSkills(){
  const d=await api('/api/skills');
  const list=toArr(d,['skills']);
  if(!list.length)return [emptyState('&#10022;','No skills available.')];
  // Group skills under their parent stack. Order comes from the server's
  // `stacks` summary (Core Skills first); anything else defaults to "Core
  // Skills". Each stack is a collapsible group.
  const groups={};const order=[];
  (toArr(d,['stacks'])).forEach(s=>{const n=s.name||'Core Skills';if(!(n in groups)){groups[n]=[];order.push(n);}});
  list.forEach(s=>{const stack=s.stack||s.category||'Core Skills';
    if(!(stack in groups)){groups[stack]=[];order.push(stack);}groups[stack].push(s);});
  const out=[];
  order.forEach(name=>{
    const skills=groups[name]||[];if(!skills.length)return;
    const wrap=el('div','stack');
    const head=el('div','stack-head');
    head.innerHTML='<span class="caret">&#9660;</span><span class="sname">'+esc(name)+'</span>';
    head.appendChild(el('span','badge v',String(skills.length)));
    head.onclick=()=>wrap.classList.toggle('collapsed');
    const body=el('div','stack-body');
    skills.forEach(s=>{const r=el('div','row');const g=el('div','grow');g.style.cursor='default';
      g.appendChild(el('div','title',s.name||s.id||''));
      if(s.description)g.appendChild(el('div','meta',s.description));
      r.appendChild(g);body.appendChild(r);});
    wrap.appendChild(head);wrap.appendChild(body);out.push(wrap);
  });
  return out;
}
async function loadPlugins(){
  const list=toArr(await api('/api/plugins'),['plugins']);
  if(!list.length)return [emptyState('&#9638;','No plugins installed.')];
  return list.map(p=>{const r=el('div','row');const g=el('div','grow');
    g.appendChild(el('div','title',p.name||p.id||''));
    if(p.description)g.appendChild(el('div','meta',p.description));
    r.appendChild(g);if(p.kind||p.type)r.appendChild(el('span','badge',p.kind||p.type));return r;});
}
async function renderChannels(){
  showData('Channels');const b=$('#dataBody');b.innerHTML='';
  const status=el('div');status.id='channelStatus';status.style.marginBottom='16px';
  status.appendChild(el('div','empty')).innerHTML='<span class="spin"></span>';
  b.appendChild(status);
  const form=el('div');
  form.innerHTML='<div class="label" style="margin-bottom:8px">Add a Telegram channel</div>';
  const kv=el('div','kv');
  const ni=el('input','field');ni.placeholder='Name';ni.type='text';ni.autocomplete='off';
  const ti=el('input','field');ti.placeholder='Bot token';ti.type='password';ti.autocomplete='off';
  const add=el('button','btn btn-accent','Add');
  kv.appendChild(ni);kv.appendChild(ti);kv.appendChild(add);
  form.appendChild(kv);b.appendChild(form);
  const doAdd=async()=>{
    const name=ni.value.trim(),token=ti.value.trim();
    if(!name||!token){(!name?ni:ti).focus();return;}
    add.disabled=true;
    try{await api('/api/channels',{method:'POST',body:JSON.stringify({name,token,kind:'telegram'})});
      ni.value='';ti.value='';loadChannelData();}
    catch(e){alert(e.message);}finally{add.disabled=false;}
  };
  add.onclick=doAdd;
  [ni,ti].forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();}));
  const holder=el('div');holder.id='channelsList';holder.style.marginTop='18px';b.appendChild(holder);
  loadChannelData();
}
async function loadChannelData(){
  const status=$('#channelStatus'),holder=$('#channelsList');
  try{
    const d=await api('/api/channels');
    const tg=d.telegram||{};const conf=!!tg.configured;
    if(status){
      status.innerHTML='';
      const r=el('div','row');const g=el('div','grow');
      g.appendChild(el('div','title','Telegram'));
      g.appendChild(el('div','meta',conf?(tg.detail||'Connected and receiving messages.'):'Not configured — add a bot token below to enable Telegram delivery.'));
      r.appendChild(g);r.appendChild(el('span','badge '+(conf?'on':'off'),conf?'configured':'not set'));
      status.appendChild(r);
    }
    if(holder){
      const list=toArr(d,['channels']);
      holder.innerHTML='';holder.appendChild(el('div','label','Added channels'));
      if(!list.length){holder.appendChild(emptyState('&#9758;','No channels added yet.'));return;}
      list.forEach(c=>{
        const r=el('div','row');const g=el('div','grow');g.style.cursor='default';
        g.appendChild(el('div','title',c.name||'(unnamed)'));
        g.appendChild(el('div','meta',(c.kind||'telegram')+' · '+mask(c.masked||'')));
        const del=el('button','iconbtn','×');
        del.onclick=async()=>{try{await api('/api/channels/'+c.id,{method:'DELETE'});loadChannelData();}catch(e){alert(e.message);}};
        r.appendChild(g);r.appendChild(del);holder.appendChild(r);
      });
    }
  }catch(e){if(status){status.innerHTML='';status.appendChild(inlineErr(e.message));}}
}

/* ============ FILES ============ */
// filePath is an ABSOLUTE path (empty string => let the server pick the
// workspace root). The Files tab opens at that root and shows only its
// top-level entries; the user clicks into folders to descend. Navigation
// uses the absolute path/parent the server returns, so it is robust at any
// depth.
let filePath='';
async function renderFiles(path){
  activeTab='files';setActive('files');filePath=path||'';
  showData('Files');bodyLoading();
  const b=$('#dataBody');
  try{
    const d=await api('/api/files'+(filePath?'?path='+encodeURIComponent(filePath):''));
    let items=toArr(d,['files','entries','items']);
    const here=d&&d.path||filePath;const parent=d&&d.parent;
    filePath=here||'';
    b.innerHTML='';
    const crumb=el('div','crumb');crumb.innerHTML='&#9636; <b>'+esc(here||'/')+'</b>';b.appendChild(crumb);
    if(parent&&parent!==here){
      const up=el('div','row');const g=el('div','grow');g.appendChild(el('div','title','.. (up)'));
      g.onclick=()=>renderFiles(parent);up.appendChild(g);b.appendChild(up);
    }
    items.sort((a,b2)=>{const da=isDir(a),db=isDir(b2);return da===db?String(fname(a)).localeCompare(fname(b2)):(da?-1:1);});
    if(!items.length){b.appendChild(emptyState('&#9636;','This directory is empty.'));return;}
    items.forEach(it=>{
      const dir=isDir(it),name=fname(it);
      const r=el('div','row');const g=el('div','grow');
      g.innerHTML=(dir?'&#9636; ':'&#8226; ')+esc(name);
      const abs=fpath(it)||((here?here.replace(/\/$/,'')+'/':'')+name);
      g.onclick=()=>dir?renderFiles(abs):openFile(abs);
      r.appendChild(g);b.appendChild(r);
    });
  }catch(e){b.innerHTML='';b.appendChild(inlineErr(e.message));}
}
function isDir(it){if(typeof it==='string')return it.endsWith('/');return it.type==='dir'||it.type==='directory'||it.is_dir===true||it.dir===true;}
function fname(it){if(typeof it==='string')return it.replace(/\/$/,'').split('/').pop();return it.name||(it.path?String(it.path).split('/').pop():'');}
function fpath(it){if(typeof it==='string')return '';return it.path||'';}
async function openFile(full){
  showData('Files');const b=$('#dataBody');b.innerHTML='';
  const back=el('button','btn');back.innerHTML='&larr; Back';back.onclick=()=>renderFiles(filePath);
  const save=el('button','btn btn-accent','Save');save.style.marginLeft='auto';save.disabled=true;
  const bar=el('div','toolbar');bar.appendChild(back);bar.appendChild(el('div','crumb',full));bar.appendChild(save);b.appendChild(bar);
  const status=el('div','meta');status.style.margin='0 0 8px';b.appendChild(status);
  const ta=el('textarea','mono-view');
  ta.style.width='100%';ta.style.minHeight='60vh';ta.style.resize='vertical';ta.style.outline='none';
  ta.spellcheck=false;ta.value='Loading…';ta.disabled=true;
  b.appendChild(ta);
  try{
    const d=await api('/api/files/read?path='+encodeURIComponent(full));
    if(d&&typeof d==='object'&&d.binary){ta.value='(binary file — cannot edit here)';return;}
    ta.value=typeof d==='string'?d:(d.content!=null?d.content:(d.text||JSON.stringify(d,null,2)));
    ta.disabled=false;save.disabled=false;
    if(d&&d.truncated)status.textContent='Note: file is large and was truncated for viewing — saving will overwrite the file with only the shown content.';
  }catch(e){ta.value='';ta.disabled=true;b.appendChild(inlineErr(e.message));return;}
  save.onclick=async()=>{
    save.disabled=true;const old=save.textContent;save.textContent='Saving…';
    try{await api('/api/files/write',{method:'POST',body:JSON.stringify({path:full,content:ta.value})});save.textContent='Saved';}
    catch(e){alert(e.message);save.textContent=old;}
    finally{setTimeout(()=>{save.disabled=false;save.textContent=old;},1200);}
  };
}

/* ============ API KEYS ============ */
async function renderKeys(){
  showData('API Keys');const b=$('#dataBody');b.innerHTML='';
  const form=el('div');
  form.innerHTML='<div class="label" style="margin-bottom:8px">Add a key</div>';
  const kv=el('div','kv');
  const ki=el('input','field');ki.placeholder='API key value';ki.type='text';ki.autocomplete='off';
  const li=el('input','field');li.placeholder='Label';li.style.maxWidth='200px';
  const add=el('button','btn btn-accent','Add');
  kv.appendChild(ki);kv.appendChild(li);kv.appendChild(add);
  form.appendChild(kv);b.appendChild(form);
  const doAdd=async()=>{
    const key=ki.value.trim(),label=li.value.trim();
    if(!key){ki.focus();return;}
    add.disabled=true;
    try{await api('/api/keys',{method:'POST',body:JSON.stringify({key,label})});ki.value='';li.value='';listKeys();}
    catch(e){alert(e.message);}finally{add.disabled=false;}
  };
  add.onclick=doAdd;
  [ki,li].forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();}));
  const holder=el('div');holder.id='keysList';holder.style.marginTop='18px';b.appendChild(holder);
  listKeys();
}
async function listKeys(){
  const holder=$('#keysList');if(!holder)return;holder.innerHTML='<div class="empty"><span class="spin"></span></div>';
  try{
    const list=toArr(await api('/api/keys'),['keys']);
    holder.innerHTML='';holder.appendChild(el('div','label','Stored keys'));
    if(!list.length){holder.appendChild(emptyState('&#9919;','No keys stored yet.'));return;}
    list.forEach(k=>{
      const r=el('div','row');const g=el('div','grow');g.style.cursor='default';
      g.appendChild(el('div','title',k.label||'(no label)'));
      g.appendChild(el('div','meta',mask(k.masked||k.value||k.key||'')));
      const del=el('button','iconbtn','×');
      del.onclick=async()=>{try{await api('/api/keys/'+k.id,{method:'DELETE'});listKeys();}catch(e){alert(e.message);}};
      r.appendChild(g);r.appendChild(del);holder.appendChild(r);
    });
  }catch(e){holder.innerHTML='';holder.appendChild(inlineErr(e.message));}
}
function mask(v){v=String(v);if(v.includes('•')||v.includes('*'))return v;if(v.length<=8)return '••••';return v.slice(0,4)+'••••••••'+v.slice(-4);}

/* ============ ZEB DIAGNOSE (offline self-heal) ============ */
function prettyComp(c){return String(c||'').replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase());}
async function renderDiagnose(){
  showData('Zeb Diagnose');bodyLoading();
  const b=$('#dataBody');
  const paint=async(repair)=>{
    bodyLoading();
    try{
      const d=repair?await api('/api/diagnose/repair',{method:'POST'}):await api('/api/diagnose');
      b.innerHTML='';
      const note=el('div','diag-note');
      note.innerHTML='<b>Fully offline.</b> These checks and repairs run with zero AI-provider dependency — Zeb can diagnose and fix itself with no keys and no internet. If Zeb breaks, this still works.';
      b.appendChild(note);
      const overall=(d.overall||'unknown');
      const labels={ok:'All systems healthy',degraded:'Minor issues detected',critical:'Critical issues detected',unknown:'Status unknown'};
      const banner=el('div','diag-banner '+overall);
      banner.innerHTML='<span class="dbdot"></span><span>'+esc(labels[overall]||overall)+'</span>';
      const sm=d.summary||{};
      if(sm.repaired)banner.innerHTML+='<span class="badge rep" style="margin-left:auto">'+sm.repaired+' auto-repaired</span>';
      b.appendChild(banner);
      const bar=el('div','toolbar');
      const rd=el('button','btn');rd.innerHTML='&#8635; Run diagnostics';rd.onclick=()=>paint(false);
      const rp=el('button','btn btn-accent');rp.textContent='Self-heal now';rp.onclick=()=>paint(true);
      bar.appendChild(rd);bar.appendChild(rp);b.appendChild(bar);
      if(d.error)b.appendChild(inlineErr(d.error));
      const checks=d.checks||[];
      if(!checks.length&&!d.error){b.appendChild(emptyState('&#10010;','No health checks reported.'));return;}
      checks.forEach(c=>{
        const r=el('div','row');const g=el('div','grow');g.style.cursor='default';
        g.appendChild(el('div','title',prettyComp(c.component)));
        g.appendChild(el('div','meta',c.message||''));
        r.appendChild(g);
        if(c.repaired)r.appendChild(el('span','badge rep','repaired'));
        const cls=c.status==='ok'?'on':(c.status==='degraded'?'off':'crit');
        r.appendChild(el('span','badge '+cls,c.status));
        b.appendChild(r);
      });
    }catch(e){b.innerHTML='';b.appendChild(inlineErr(e.message));}
  };
  paint(false);
}

/* ============ LOCAL MODEL STATUS (live) ============ */
function fmtBytes(n){n=Number(n||0);if(n<=0)return '0 B';const u=['B','KB','MB','GB','TB'];let i=0;while(n>=1024&&i<u.length-1){n/=1024;i++;}return (i===0?n.toFixed(0):n.toFixed(1))+' '+u[i];}
function logTime(ts){const d=new Date((ts||0)*1000);return d.toLocaleTimeString([],{hour12:false});}
let lmNet=null;  // last net counters, for live bandwidth delta
async function renderLocalModel(){
  showData('Local Model Status');bodyLoading();
  const b=$('#dataBody');lmNet=null;let built=false;
  const paint=async()=>{
    let d;
    try{d=await api('/api/localmodel');}
    catch(e){if(!built){b.innerHTML='';b.appendChild(inlineErr(e.message));}return;}
    if(!built){buildLocalModel(b,d);built=true;}
    fillLocalModel(d);
  };
  await paint();
  stopPanelTimer();
  panelTimer=setInterval(()=>{
    if(activeTab!=='localmodel'){stopPanelTimer();return;}
    paint();
  },1500);
}
function buildLocalModel(b,d){
  b.innerHTML='';
  const head=el('div','row');head.style.cursor='default';
  const g=el('div','grow');
  const t=el('div','title');t.innerHTML='<span class="stat-dot" id="lmDot"></span> <span id="lmName">'+esc(d.name||'Local model')+'</span>';
  g.appendChild(t);g.appendChild(el('div','meta')).id='lmMeta';
  head.appendChild(g);
  const st=el('span','badge');st.id='lmState';head.appendChild(st);
  b.appendChild(head);
  const grid=el('div','card-grid');
  grid.innerHTML=
    '<div class="stat-card"><div class="sc-label">Model</div><div class="sc-val" id="lmModelVal">—</div><div class="sc-sub" id="lmModelSub"></div></div>'+
    '<div class="stat-card"><div class="sc-label">State</div><div class="sc-val" id="lmStateVal">—</div><div class="sc-sub" id="lmStateSub"></div></div>';
  b.appendChild(grid);
  const meters=el('div');
  meters.innerHTML=
    '<div class="meter"><div class="mlabel"><span>CPU</span><b id="lmCpuTxt">—</b></div><div class="mbar"><div class="mfill" id="lmCpuFill"></div></div></div>'+
    '<div class="meter"><div class="mlabel"><span>Memory (system)</span><b id="lmRamTxt">—</b></div><div class="mbar"><div class="mfill" id="lmRamFill"></div></div></div>'+
    '<div class="meter" id="lmDlWrap" style="display:none"><div class="mlabel"><span id="lmDlLabel">Downloading weights</span><b id="lmDlTxt">—</b></div><div class="mbar"><div class="mfill" id="lmDlFill"></div></div></div>';
  b.appendChild(meters);
  b.appendChild(el('div','sec-label','Bandwidth'));
  const bw=el('div','meta');bw.id='lmNet';bw.style.fontFamily='var(--mono)';bw.textContent='—';b.appendChild(bw);
  b.appendChild(el('div','sec-label','Background activity'));
  const box=el('div','logbox');box.id='lmLogs';box.textContent='No activity yet.';b.appendChild(box);

function setMeter(fillId,txtId,pct,txt,hot){
  const f=$('#'+fillId),t=$('#'+txtId);if(!f)return;
  f.style.width=Math.max(0,Math.min(100,Number(pct)||0))+'%';
  f.classList.toggle('hot',!!hot);
  if(t&&txt!=null)t.textContent=txt;
}
function fillLocalModel(d){
  const dot=$('#lmDot');if(!dot)return;
  const dl=d.download||{},ram=d.ram||{},net=d.net||{};
  const loaded=!!d.loaded,ready=!!d.ready,dlActive=!!dl.active;
  $('#lmName').textContent=d.name||'Local model';
  dot.className='stat-dot '+(loaded||dlActive?'on':(ready?'warn':'off'));
  const stateTxt=loaded?'active':(dlActive?'downloading':(ready?'ready':'idle'));
  const stBadge=$('#lmState');stBadge.textContent=stateTxt;
  stBadge.className='badge '+(loaded?'on':(dlActive?'v':(ready?'off':'')));
  $('#lmMeta').textContent=(d.path||'(weights not downloaded yet)')+(d.size_bytes?(' · '+fmtBytes(d.size_bytes)):'');
  $('#lmModelVal').textContent=String(d.name||'—').split(' · ')[0];
  $('#lmModelSub').textContent=(d.provider||'local-model')+(d.ctx?(' · '+d.ctx+' ctx'):'');
  $('#lmStateVal').textContent=stateTxt;
  $('#lmStateSub').textContent=ready?(loaded?'loaded in memory':'weights cached on disk'):(dlActive?'downloading weights…':'weights not yet downloaded');
  const cpu=Number(d.cpu_percent||0);
  setMeter('lmCpuFill','lmCpuTxt',cpu,cpu.toFixed(0)+'%'+(d.process_cpu_percent?(' · proc '+Number(d.process_cpu_percent).toFixed(0)+'%'):''),cpu>85);
  const rp=Number(ram.percent||0);
  const ramTxt=(ram.system_used_mb!=null?fmtBytes(ram.system_used_mb*1048576)+' / '+fmtBytes((ram.system_total_mb||0)*1048576):rp.toFixed(0)+'%')+(ram.process_mb!=null?(' · Zeb '+fmtBytes(ram.process_mb*1048576)):'');
  setMeter('lmRamFill','lmRamTxt',rp,ramTxt,rp>88);
  const dw=$('#lmDlWrap');
  if(dlActive){
    dw.style.display='';
    setMeter('lmDlFill','lmDlTxt',Number(dl.percent||0),(dl.human_downloaded||'')+(dl.human_total?(' / '+dl.human_total):'')+(dl.human_rate?(' · '+dl.human_rate):''),false);
    $('#lmDlLabel').textContent='Downloading '+(dl.file||'weights');
  }else if(dl&&Number(dl.percent)>=100&&dl.total_bytes){
    dw.style.display='';setMeter('lmDlFill','lmDlTxt',100,'complete',false);$('#lmDlLabel').textContent='Weights downloaded';
  }else{dw.style.display='none';}
  if(net.bytes_recv!=null){
    let line='session ↓ '+fmtBytes(net.bytes_recv)+'  ↑ '+fmtBytes(net.bytes_sent);
    if(lmNet){
      const dr=Math.max(0,net.bytes_recv-lmNet.r),ds=Math.max(0,net.bytes_sent-lmNet.s),dt=Math.max(0.001,(Date.now()-lmNet.t)/1000);
      line+='   ·   now ↓ '+fmtBytes(dr/dt)+'/s  ↑ '+fmtBytes(ds/dt)+'/s';
    }
    lmNet={r:net.bytes_recv,s:net.bytes_sent,t:Date.now()};
    $('#lmNet').textContent=line;
  }
  const logs=d.events||[],box=$('#lmLogs');
  if(logs.length){
    box.innerHTML='';
    logs.slice(-80).forEach(ev=>{
      const l=el('div','logline '+(ev.level==='error'?'error':(ev.level==='warn'?'warn':'')));
      l.innerHTML='<span class="lt">'+logTime(ev.ts)+'</span><span class="le">'+esc(ev.event||'')+'</span><span class="ld">'+esc(ev.detail||'')+'</span>';
      box.appendChild(l);
    });
    box.scrollTop=box.scrollHeight;
  }
}

/* ============ CHAT ============ */
let history=[], currentSession=null, awaiting=false;
let selectedModel=localStorage.getItem(LS_MODEL)||'local';

/* Persist the active conversation so navigating away (or reloading) returns

function saveChatState(){

/* Model selector: local backbone is the default/priority; connected API

function renderMessages(){

function addMsgNode(role,content,anim){

  const t=el('div','typing');t.innerHTML='<i></i><i></i><i></i>';typingNode.appendChild(t);sc.appendChild(typingNode);scrollBottom();}

const input=$('#chatInput'), sendBtn=$('#sendBtn');
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,160)+'px';});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});

async function sendMsg(){
  const text=input.value.trim();
  if(!text||awaiting)return;
  input.value='';input.style.height='auto';
  history.push({role:'user',content:text});addMsgNode('user',text);saveChatState();
  awaiting=true;sendBtn.disabled=true;Brain.setTarget(1.0);showTyping();
  try{
    // Local backbone is the default: only send a provider when the user has
    // explicitly picked a remote in the model selector.
    const payload={message:text,history:history.slice(0,-1)};
    if(selectedModel&&selectedModel!=='local'&&selectedModel!=='local-model')payload.provider=selectedModel;
    const d=await api('/api/chat',{method:'POST',body:JSON.stringify(payload)});
    const reply=(d&&(d.reply!=null?d.reply:d.content))||'(no reply)';
    hideTyping();history.push({role:'assistant',content:reply});addMsgNode('assistant',reply);saveChatState();
    if(Voice.active)Voice.speak(reply);
  }catch(e){hideTyping();addMsgNode('assistant','⚠ '+e.message);}
  finally{awaiting=false;sendBtn.disabled=false;Brain.setTarget(null);input.focus();}
}

/* ============ VOICE CHAT ============ */
/* Browser Web Speech API: transcribe speech -> feed the SAME /api/chat
   pipeline as typed messages (identical permissions & workspace access),
   then speak Zeb's reply back. Fully client-side; degrades gracefully when
   the browser has no SpeechRecognition. */
const Voice=(function(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const synth=window.speechSynthesis||null;
  let rec=null, active=false, listening=false, serverVoice=false;
  const btn=()=>document.getElementById('voiceBtn');
  function supported(){return !!SR;}
  function setBtn(state){
    const b=btn();if(!b)return;
    b.classList.toggle('listening',state==='listening');
    b.classList.toggle('speaking',state==='speaking');
    b.title=state==='listening'?'Listening… click to stop':(active?'Voice chat on — click to stop':'Voice chat');
  }
  function afterSpeak(){setBtn(active?'':'');if(active&&!awaiting)startListening();}
  function browserSpeak(text){
    if(!synth||!active)return;
    try{
      synth.cancel();
      const u=new SpeechSynthesisUtterance(String(text).slice(0,3000));
      u.rate=1.02;u.pitch=1.0;
      setBtn('speaking');
      u.onend=afterSpeak;
      synth.speak(u);
    }catch(e){afterSpeak();}
  }
  // Prefer Zeb's offline neural voice (server-side Piper) when it's available,
  // falling back to the browser's own speechSynthesis. Both feed the SAME
  // local-model reply, so voice output "just works" either way.
  async function speak(text){
    if(!active)return;
    const t=String(text||'').slice(0,3000);
    if(serverVoice){
      try{
        const res=await fetch('/api/voice/speak',{method:'POST',
          headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},
          body:JSON.stringify({text:t})});
        if(res.ok&&(res.headers.get('content-type')||'').indexOf('audio')>=0){
          const url=URL.createObjectURL(await res.blob());
          const audio=new Audio(url);setBtn('speaking');
          audio.onended=()=>{URL.revokeObjectURL(url);afterSpeak();};
          audio.onerror=()=>{URL.revokeObjectURL(url);browserSpeak(t);};
          audio.play().catch(()=>{URL.revokeObjectURL(url);browserSpeak(t);});
          return;
        }
      }catch(e){/* fall through to browser voice */}
    }
    browserSpeak(t);
  }
  function startListening(){
    if(!rec||listening)return;
    try{listening=true;setBtn('listening');rec.start();}catch(e){listening=false;}
  }
  function stopListening(){if(rec&&listening){try{rec.stop();}catch(e){}}listening=false;}
  function build(){
    rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.continuous=false;
    rec.onresult=(ev)=>{
      const t=(ev.results&&ev.results[0]&&ev.results[0][0]&&ev.results[0][0].transcript||'').trim();
      if(t){input.value=t;sendMsg();}
    };
    rec.onerror=()=>{listening=false;setBtn(active?'':'');};
    rec.onend=()=>{listening=false;if(active&&!awaiting&&!(synth&&synth.speaking))setBtn('');};
  }
  function toggle(){
    if(!supported()){alert('Voice chat needs a browser with speech recognition (try Chrome/Edge).');return;}
    if(!rec)build();
    active=!active;
    if(active){setBtn('');startListening();}
    else{stopListening();if(synth)synth.cancel();setBtn('');}
  }
  return {
    get active(){return active;},
    speak,toggle,supported,
    init(){
      const b=btn();if(!b)return;
      if(!supported()){b.disabled=true;b.title='Voice chat not supported in this browser';return;}
      b.onclick=toggle;
      // Detect Zeb's offline neural voice (Piper) and use it when present.
      try{
        fetch('/api/voice/status',{headers:{'Authorization':'Bearer '+KEY}})
          .then(r=>r.ok?r.json():null)
          .then(s=>{if(s&&s.engine==='piper')serverVoice=true;})
          .catch(()=>{});
      }catch(e){}
    }
  };
})();

/* ============ STATUS POLL ============ */
async function pollStatus(){
  try{
    const s=await api('/api/status');
    const active=(s.active_turns||0)>0;
    const st=(s.state||'idle').toLowerCase();
    let target;
    if(awaiting)target=1.0;
    else if(st==='communicating'){target=0.85;Brain.comm=true;}
    else if(active||['thinking','processing'].includes(st)){target=0.8;Brain.comm=false;}
    else{target=0.05;Brain.comm=false;}
    Brain.setTarget(awaiting?1.0:target);
    $('#brainStatus').textContent=awaiting?'thinking':st;
  }catch(e){/* silent, keep last state */}
  finally{setTimeout(pollStatus,800);}
}

/* ============ BOOT ============ */
let booted=false;
function boot(){
  if(booted){applyMode();return;}
  booted=true;
  applyMode();
  applySidebar();
  Voice.init();
  Brain.init();
  restoreChatState();       // return to the same conversation, not a new one
  loadModelSelector();      // populate the chat model dropdown (local default)
  renderMessages();
  showChat();setActive('sessions');
  pollStatus();
  maybeOnboard();           // first-boot identity questions
  input.focus();
}
</script>

<script>
/* ============ BRAIN — RAW WebGL ============ */
const Brain=(function(){
  // 2D-canvas neuron network: a handful of neurons that drift, connected by
  // synapses, with signals that travel edge-to-edge and make nodes FIRE
  // (flash) on arrival — chaining into neighbours. Energy (driven by agent
  // activity) scales the firing rate, signal speed, and glow. Reads clearly
  // as a living network at small size, where 260 WebGL points looked like a
  // single fuzzy blob.
  let canvas,ctx,ok=false;
  let W=0,H=0,dpr=1;
  let energy=0.05, targetEnergy=0.05;
  let nodes=[], edges=[], signals=[];
  let last=0, fireAcc=0;
  const api={comm:false};

  function rnd(a,b){return a+Math.random()*(b-a);}

  function build(){
    const N=14;nodes=[];
    for(let i=0;i<N;i++){
      const ang=(i/N)*Math.PI*2+rnd(-0.35,0.35);
      const rad=rnd(0.30,0.86);
      nodes.push({
        x:0.5+Math.cos(ang)*rad*0.42,
        y:0.5+Math.sin(ang)*rad*0.42,
        vx:rnd(-1,1)*0.012, vy:rnd(-1,1)*0.012,
        fire:0, seed:Math.random()
      });
    }
    edges=[];
    const has=(i,j)=>edges.some(e=>(e[0]===i&&e[1]===j)||(e[0]===j&&e[1]===i));
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d<0.30)edges.push([i,j]);
    }
    // guarantee no orphan nodes: link each to its nearest neighbour
    for(let i=0;i<N;i++){
      let best=-1,bd=9;
      for(let j=0;j<N;j++){if(j===i)continue;
        const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
        if(d<bd){bd=d;best=j;}}
      if(best>=0&&!has(i,best))edges.push([Math.min(i,best),Math.max(i,best)]);
    }
  }

  function emitFrom(idx){
    nodes[idx].fire=1;
    edges.forEach(e=>{
      let to=-1;
      if(e[0]===idx)to=e[1];else if(e[1]===idx)to=e[0];else return;
      if(signals.length<90&&Math.random()<0.85)signals.push({from:idx,to,t:0});
    });
  }

  function neuronColor(){return api.comm?[255,92,200]:[34,224,208];}
  function signalColor(){return api.comm?[255,130,170]:[160,107,255];}

  function step(dt){
    energy+=(targetEnergy-energy)*Math.min(1,dt*3.0);
    nodes.forEach(n=>{
      n.x+=n.vx*dt*(0.4+energy);n.y+=n.vy*dt*(0.4+energy);
      if(n.x<0.12||n.x>0.88){n.vx*=-1;n.x=Math.max(0.12,Math.min(0.88,n.x));}
      if(n.y<0.12||n.y>0.88){n.vy*=-1;n.y=Math.max(0.12,Math.min(0.88,n.y));}
      n.fire=Math.max(0,n.fire-dt*2.4);
    });
    fireAcc+=dt*(0.5+energy*7.0);
    while(fireAcc>=1){fireAcc-=1;if(nodes.length)emitFrom((Math.random()*nodes.length)|0);}
    const speed=0.55+energy*2.2;
    for(let i=signals.length-1;i>=0;i--){
      const s=signals[i];s.t+=dt*speed;
      if(s.t>=1){
        nodes[s.to].fire=1;
        if(Math.random()<0.5+energy*0.4)emitFrom(s.to);
        signals.splice(i,1);
      }
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    const nc=neuronColor(),sc=signalColor();
    // synapses
    ctx.lineWidth=1;
    edges.forEach(e=>{
      const a=nodes[e[0]],b=nodes[e[1]];
      ctx.strokeStyle='rgba('+nc[0]+','+nc[1]+','+nc[2]+','+(0.05+energy*0.14)+')';
      ctx.beginPath();ctx.moveTo(a.x*W,a.y*H);ctx.lineTo(b.x*W,b.y*H);ctx.stroke();
    });
    // travelling signals
    signals.forEach(s=>{
      const a=nodes[s.from],b=nodes[s.to];
      const x=(a.x+(b.x-a.x)*s.t)*W,y=(a.y+(b.y-a.y)*s.t)*H;
      const r=2.0+energy*2.2;
      const g=ctx.createRadialGradient(x,y,0,x,y,r*3);
      g.addColorStop(0,'rgba('+sc[0]+','+sc[1]+','+sc[2]+',0.95)');
      g.addColorStop(1,'rgba('+sc[0]+','+sc[1]+','+sc[2]+',0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*3,0,7);ctx.fill();
    });
    // neurons
    const time=performance.now()/1000;
    nodes.forEach(n=>{
      const x=n.x*W,y=n.y*H;
      const pulse=0.5+0.5*Math.sin(time*(1.2+energy*3.0)+n.seed*6.28);
      const rr=1.7+energy*1.6+pulse*(0.5+energy*1.0)+n.fire*3.4;
      const bright=0.5+n.fire*0.5+energy*0.3;
      const glow=ctx.createRadialGradient(x,y,0,x,y,rr*3.2);
      glow.addColorStop(0,'rgba('+nc[0]+','+nc[1]+','+nc[2]+','+bright+')');
      glow.addColorStop(1,'rgba('+nc[0]+','+nc[1]+','+nc[2]+',0)');
      ctx.fillStyle=glow;ctx.beginPath();ctx.arc(x,y,rr*3.2,0,7);ctx.fill();
      ctx.fillStyle='rgba('+Math.min(255,nc[0]+140)+','+Math.min(255,nc[1]+30)+','+Math.min(255,nc[2]+50)+','+(0.75+n.fire*0.25)+')';
      ctx.beginPath();ctx.arc(x,y,Math.max(1,rr*0.5),0,7);ctx.fill();
    });
  }

  function resize(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    W=canvas.clientWidth||180;H=canvas.clientHeight||180;
    canvas.width=Math.max(1,W*dpr);canvas.height=Math.max(1,H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function frame(ts){
    if(!ok)return;
    const dt=Math.min((ts-last)/1000,0.05);last=ts;
    step(dt);draw();
    requestAnimationFrame(frame);
  }

  function fallback(){
    // No WebGL available: render a CSS/SVG neuron network (multiple firing
    // nodes + pulsing connecting lines) instead of a single static blob.
    const wrap=document.getElementById('brainWrap');
    if(wrap.querySelector('.brain-fallback'))return;
    if(canvas)canvas.style.display='none';
    const NS='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(NS,'svg');
    svg.setAttribute('viewBox','0 0 100 100');
    svg.classList.add('brain-fallback');
    const pts=[[50,18],[30,30],[70,30],[18,48],[50,42],[82,48],[30,66],[70,66],[50,82],[40,54],[60,54]];
    const edges=[[0,1],[0,2],[1,3],[2,5],[1,4],[2,4],[3,6],[5,7],[4,9],[4,10],[6,8],[7,8],[9,10],[3,9],[5,10],[1,9],[2,10]];
    edges.forEach((e,i)=>{
      const line=document.createElementNS(NS,'line');
      line.setAttribute('x1',pts[e[0]][0]);line.setAttribute('y1',pts[e[0]][1]);
      line.setAttribute('x2',pts[e[1]][0]);line.setAttribute('y2',pts[e[1]][1]);
      line.setAttribute('class','fedge'+(i%2===0?' pulse':''));
      line.style.animationDelay=(i*0.14)+'s';
      svg.appendChild(line);
    });
    pts.forEach((p,i)=>{
      const c=document.createElementNS(NS,'circle');
      c.setAttribute('cx',p[0]);c.setAttribute('cy',p[1]);c.setAttribute('r',2.4);
      c.setAttribute('class','fnode');
      c.style.animationDelay=(i*0.17)+'s';
      svg.appendChild(c);
    });
    wrap.insertBefore(svg,wrap.firstChild);
  }

  return {
    comm:false,
    init(){
      try{
        canvas=document.getElementById('brainCanvas');
        ctx=canvas.getContext('2d');
        if(!ctx){fallback();return;}
        resize();build();ok=true;
        window.addEventListener('resize',resize);
        // seed a little initial activity so it's alive immediately
        for(let i=0;i<3;i++)emitFrom((Math.random()*nodes.length)|0);
        last=performance.now();requestAnimationFrame(frame);
      }catch(e){ok=false;fallback();}
    },
    setTarget(v){
      // v null => leave to status poll baseline; else force
      if(v==null){targetEnergy=Math.max(targetEnergy,0.05);}
      else targetEnergy=v;
    },
    set comm(v){api.comm=v;}, get comm(){return api.comm;}
  };
})();

/* start: gate or app */
if(KEY){
  validateKey(KEY).then(good=>{
    if(good){document.getElementById('gate').style.display='none';document.getElementById('app').classList.add('on');boot();}
    else{localStorage.removeItem(LS_KEY);KEY='';showGate();}
  });
}
else{showGate();}
</script>
