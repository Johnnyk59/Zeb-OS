#
# docker-compose.yml for Zeb Agent
#
# Usage:
#   ZEB_UID=$(id -u) ZEB_GID=$(id -g) docker compose up -d
#
# Set ZEB_UID / ZEB_GID to the host user that owns ~/.zeb so
# files created inside the container stay readable/writable on the host.
# The s6-overlay stage2 hook remaps the internal `zeb` user to these
# values via usermod/groupmod; each supervised service then drops to that
# user via `s6-setuidgid`.
#
# Persistence:
#   Every service mounts `~/.zeb -> /opt/data` (ZEB_HOME). ALL of Zeb's
#   durable state lives there and therefore survives container restarts AND
#   image upgrades (the mount is host-owned; recreating the container never
#   touches it):
#     - chat sessions + conversation history  (/opt/data/chat/sessions)
#     - learned identity (who am I / mission)  (/opt/data/chat/identity.json)
#     - saved GitHub repos                     (/opt/data/chat/repos.json)
#     - API keys + channels                    (/opt/data/chat/*.json)
#     - autonomy memory / learned data         (/opt/data/autonomy)
#     - the downloaded local model weights     (/opt/data/models/gguf)  <- so
#       the multi-GB GGUF is fetched once and reused across every upgrade.
#   To use a named Docker volume instead of the ~/.zeb bind mount, replace
#   `~/.zeb:/opt/data` with `zeb-data:/opt/data` on each service and add a
#   top-level `volumes:\n  zeb-data:` block.
#
# Security notes:
#   - The dashboard service binds to 127.0.0.1 by default. It stores API
#     keys; exposing it on LAN without auth is unsafe. If you want remote
#     access, use an SSH tunnel or put it behind a reverse proxy that
#     adds authentication — do NOT pass --insecure --host 0.0.0.0.
#   - If you override entrypoint, keep `/init` as the first command in
#     the chain (or let docker use the image's default ENTRYPOINT,
#     which is `["/init", "/opt/zeb/docker/main-wrapper.sh"]`).
#     `/init` is s6-overlay's PID 1 — it runs the cont-init.d scripts
#     (chown, profile reconcile, dashboard toggle) and sets up the
#     supervision tree before any service starts. Bypassing it skips
#     all of that setup and the gateway will not work correctly.
#   - The gateway's API server is off unless you uncomment API_SERVER_KEY
#     and API_SERVER_HOST. See docs/user-guide/api-server.md before doing
#     this on an internet-facing host.
#
services:
  gateway:
    build: .
    image: zeb-agent
    container_name: zeb
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/.zeb:/opt/data
    environment:
      - ZEB_UID=${ZEB_UID:-10000}
      - ZEB_GID=${ZEB_GID:-10000}
      # To expose the OpenAI-compatible API server beyond localhost,
      # uncomment BOTH lines (API_SERVER_KEY is mandatory for auth):
      # - API_SERVER_HOST=0.0.0.0
      # - API_SERVER_KEY=${API_SERVER_KEY}
      # Microsoft Teams — uncomment and fill in to enable Teams gateway.
      # Register your bot at https://dev.botframework.com/ to get these values.
      # - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID}
      # - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET}
      # - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      # - TEAMS_ALLOWED_USERS=${TEAMS_ALLOWED_USERS}
      # - TEAMS_PORT=${TEAMS_PORT:-3978}
      # Google Chat — uncomment and fill in to enable the Google Chat gateway.
      # See website/docs/user-guide/messaging/google_chat.md for the full setup.
      # The SA JSON path must point to a file mounted into the container —
      # add a volume entry above (e.g. ``- ~/.zeb/google-chat-sa.json:/secrets/google-chat-sa.json:ro``)
      # then set GOOGLE_CHAT_SERVICE_ACCOUNT_JSON to that mount path.
      # - GOOGLE_CHAT_PROJECT_ID=${GOOGLE_CHAT_PROJECT_ID}
      # - GOOGLE_CHAT_SUBSCRIPTION_NAME=${GOOGLE_CHAT_SUBSCRIPTION_NAME}
      # - GOOGLE_CHAT_SERVICE_ACCOUNT_JSON=${GOOGLE_CHAT_SERVICE_ACCOUNT_JSON}
      # - GOOGLE_CHAT_ALLOWED_USERS=${GOOGLE_CHAT_ALLOWED_USERS}
    command: ["gateway", "run"]

  dashboard:
    image: zeb-agent
    container_name: zeb-dashboard
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gateway
    volumes:
      - ~/.zeb:/opt/data
    environment:
      - ZEB_UID=${ZEB_UID:-10000}
      - ZEB_GID=${ZEB_GID:-10000}
    # Localhost-only. For remote access, tunnel via `ssh -L 9119:localhost:9119`.
    command: ["dashboard", "--host", "127.0.0.1", "--no-open"]

  # Clean chat-only web UI (zeb_chat/) — "paste a key and chat like standard
  # Hermes", no terminal, no multi-panel dashboard. On first start it generates
  # an API key, persists it under ~/.zeb (the /opt/data volume), and PRINTS IT
  # TO THIS SERVICE'S LOGS. Open http://localhost:8000, paste that key, and chat
  # with full agent access. To pin a fixed key, set ZEB_CHAT_API_KEY.
  #   See the key:  docker compose logs chat | grep -i "chat api key"
  chat:
    image: zeb-agent
    container_name: zeb-chat
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gateway
    volumes:
      - ~/.zeb:/opt/data
    environment:
      - ZEB_UID=${ZEB_UID:-10000}
      - ZEB_GID=${ZEB_GID:-10000}
      # Optional: pin a fixed key instead of the auto-generated one.
      # - ZEB_CHAT_API_KEY=${ZEB_CHAT_API_KEY}
    # Localhost-only bind; the API key is always required (no loopback bypass).
    command: ["chatui", "--host", "127.0.0.1", "--port", "8000"]
